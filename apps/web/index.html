<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashDev Indie Game Forum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply stored theme before first paint to avoid flash.
      (function () {
        try {
          const key = 'flashdev-gameweb.theme'
          const themes = ['flashdev', 'cyberpunk', 'dreamy-future']
          const raw = localStorage.getItem(key)
          const theme = themes.includes(raw) ? raw : 'flashdev'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (_) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
