<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlashDev — 独立游戏开发者一体化平台</title>
  <style>
    /* ============================================================
       FlashDev SPA — Shared Design System
       Dark luxury + tech utility palette extracted from brand assets
       ============================================================ */
    :root {
      --bg:        oklch(15% 0.03 280);
      --surface:   oklch(22% 0.04 280);
      --fg:        oklch(95% 0.005 250);
      --muted:     oklch(60% 0.03 280);
      --border:    oklch(28% 0.03 280);
      --accent:    oklch(68% 0.20 45);
      --accent-2:     oklch(58% 0.18 45);
      --accent-glow:  oklch(68% 0.20 45 / 0.22);
      --surface-elev: oklch(28% 0.05 280);
      --surface-hover:oklch(32% 0.05 280);
      --success:      oklch(65% 0.15 145);
      --warn:         oklch(75% 0.14 85);
      --danger:       oklch(58% 0.18 25);
      --info:         oklch(65% 0.12 250);
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text',  'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      --text-xs:   clamp(10px, 0.7vw, 12px);
      --text-sm:   clamp(12px, 0.85vw, 14px);
      --text-base: clamp(14px, 1vw, 16px);
      --text-lg:   clamp(16px, 1.15vw, 18px);
      --text-xl:   clamp(20px, 1.5vw, 24px);
      --text-2xl:  clamp(28px, 2.2vw, 36px);
      --text-3xl:  clamp(36px, 3vw, 48px);
      --text-4xl:  clamp(48px, 4vw, 64px);
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
      --space-6: 24px; --space-8: 32px; --space-10:40px; --space-12:48px; --space-16:64px;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px; --radius-xl: 24px; --radius-full: 999px;
      --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.25);
      --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.35);
      --shadow-lg: 0 12px 40px oklch(0% 0 0 / 0.45);
      --shadow-glow: 0 0 24px var(--accent-glow);
      --transition-fast: 0.15s ease;
      --transition-base: 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6; color: var(--fg); background: var(--bg); min-height: 100vh; }
    img { max-width: 100%; display: block; }
    a { color: var(--accent); text-decoration: none; transition: opacity var(--transition-fast); }
    a:hover { opacity: 0.85; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    ul, ol { list-style: none; }
    input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--space-3) var(--space-4); outline: none; transition: border-color var(--transition-fast), box-shadow var(--transition-fast); }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea { resize: vertical; min-height: 100px; }
    ::placeholder { color: var(--muted); }

    .container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 var(--space-5); }
    .grid { display: grid; gap: var(--space-5); }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: var(--space-2); }
    .gap-3 { gap: var(--space-3); }
    .gap-4 { gap: var(--space-4); }
    .gap-5 { gap: var(--space-5); }
    .gap-6 { gap: var(--space-6); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); transition: background var(--transition-base), border-color var(--transition-base), transform var(--transition-base); }
    .card-hover:hover { background: var(--surface-hover); border-color: oklch(35% 0.04 280); transform: translateY(-2px); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); padding: var(--space-3) var(--space-5); border-radius: var(--radius-sm); font-weight: 600; font-size: var(--text-sm); line-height: 1.4; transition: all var(--transition-fast); white-space: nowrap; }
    .btn-primary { background: var(--accent); color: oklch(15% 0.03 280); border: 1px solid var(--accent); }
    .btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); opacity: 1; box-shadow: var(--shadow-glow); }
    .btn-ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-elev); border-color: var(--muted); opacity: 1; }
    .btn-sm { padding: var(--space-2) var(--space-3); font-size: var(--text-xs); }
    .btn-lg { padding: var(--space-4) var(--space-6); font-size: var(--text-base); border-radius: var(--radius-md); }

    .badge { display: inline-flex; align-items: center; gap: var(--space-1); padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; font-family: var(--font-mono); letter-spacing: 0.02em; }
    .badge-accent { background: oklch(68% 0.20 45 / 0.15); color: var(--accent); border: 1px solid oklch(68% 0.20 45 / 0.25); }
    .badge-success { background: oklch(65% 0.15 145 / 0.12); color: var(--success); border: 1px solid oklch(65% 0.15 145 / 0.2); }
    .badge-warn   { background: oklch(75% 0.14 85 / 0.12); color: var(--warn); border: 1px solid oklch(75% 0.14 85 / 0.2); }
    .badge-danger { background: oklch(58% 0.18 25 / 0.12); color: var(--danger); border: 1px solid oklch(58% 0.18 25 / 0.2); }
    .badge-muted  { background: var(--surface-elev); color: var(--muted); border: 1px solid var(--border); }

    .avatar { width: 40px; height: 40px; border-radius: var(--radius-full); background: var(--surface-elev); border: 1px solid var(--border); object-fit: cover; }
    .avatar-sm { width: 28px; height: 28px; }
    .avatar-lg { width: 64px; height: 64px; }

    .divider { height: 1px; background: var(--border); margin: var(--space-4) 0; }
    .stat-value { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--text-xl); font-weight: 700; color: var(--fg); }
    .stat-label { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Navigation */
    .site-nav { position: sticky; top: 0; z-index: 100; background: oklch(15% 0.03 280 / 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .site-nav .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; gap: var(--space-4); }
    .site-nav .logo { display: flex; align-items: center; gap: var(--space-3); font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; color: var(--fg); letter-spacing: -0.02em; }
    .site-nav .logo img { width: 32px; height: 32px; border-radius: var(--radius-sm); }
    .site-nav .nav-links { display: flex; align-items: center; gap: var(--space-1); }
    .site-nav .nav-links a { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); font-size: var(--text-sm); font-weight: 500; color: var(--muted); transition: all var(--transition-fast); }
    .site-nav .nav-links a:hover, .site-nav .nav-links a.active { color: var(--fg); background: var(--surface-elev); }
    .site-nav .nav-links a.active { box-shadow: inset 0 0 0 1px var(--border); }
    .site-nav .nav-actions { display: flex; align-items: center; gap: var(--space-3); }
    .nav-search { position: relative; display: none; }
    .nav-search input { width: 220px; padding-left: 36px; background: var(--surface); }
    .nav-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted); pointer-events: none; }
    .nav-toggle { display: none; flex-direction: column; gap: 4px; padding: var(--space-2); }
    .nav-toggle span { display: block; width: 20px; height: 2px; background: var(--fg); border-radius: 2px; transition: 0.2s; }

    /* Hero */
    .hero { position: relative; padding: var(--space-16) 0; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 40%, oklch(68% 0.20 45 / 0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 60%, oklch(28% 0.08 280 / 0.4) 0%, transparent 55%); pointer-events: none; }
    .hero-content { position: relative; max-width: 720px; }
    .hero-kicker { display: inline-flex; align-items: center; gap: var(--space-2); font-family: var(--font-mono); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: var(--space-4); }
    .hero-title { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: var(--space-5); }
    .hero-title .accent { color: var(--accent); }
    .hero-desc { font-size: var(--text-lg); color: var(--muted); line-height: 1.7; max-width: 560px; margin-bottom: var(--space-8); }
    .hero-actions { display: flex; gap: var(--space-4); flex-wrap: wrap; }

    /* Section headers */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-6); gap: var(--space-4); flex-wrap: wrap; }
    .section-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.01em; }
    .section-meta { font-size: var(--text-sm); color: var(--muted); }

    /* Tabs */
    .tabs { display: flex; gap: var(--space-1); border-bottom: 1px solid var(--border); margin-bottom: var(--space-6); }
    .tab { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all var(--transition-fast); white-space: nowrap; }
    .tab:hover { color: var(--fg); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Project / Listing cards */
    .project-card { display: flex; gap: var(--space-5); padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); transition: all var(--transition-base); }
    .project-card:hover { background: var(--surface-hover); border-color: oklch(35% 0.04 280); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .project-card .cover { width: 160px; height: 100px; border-radius: var(--radius-sm); background: var(--surface-elev); border: 1px solid var(--border); flex-shrink: 0; object-fit: cover; }
    .project-card .body { flex: 1; min-width: 0; }
    .project-card .title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.01em; margin-bottom: var(--space-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-card .desc { font-size: var(--text-sm); color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: var(--space-3); }
    .project-card .meta { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
    .project-card .meta-item { display: flex; align-items: center; gap: var(--space-1); font-size: var(--text-xs); color: var(--muted); font-family: var(--font-mono); }
    .project-card .meta-item strong { color: var(--fg); font-weight: 600; }

    .thread-item { display: flex; gap: var(--space-4); padding: var(--space-5) 0; border-bottom: 1px solid var(--border); }
    .thread-item:last-child { border-bottom: none; }
    .thread-body { flex: 1; min-width: 0; }
    .thread-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2); flex-wrap: wrap; }
    .thread-author { font-weight: 600; font-size: var(--text-sm); color: var(--fg); }
    .thread-time { font-size: var(--text-xs); color: var(--muted); font-family: var(--font-mono); }
    .thread-text { font-size: var(--text-sm); color: var(--muted); line-height: 1.6; }

    /* Footer */
    .site-footer { border-top: 1px solid var(--border); padding: var(--space-10) 0; margin-top: var(--space-16); }
    .site-footer .footer-grid { display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: var(--space-8); }
    .site-footer .footer-brand { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-3); }
    .site-footer .footer-desc { font-size: var(--text-sm); color: var(--muted); line-height: 1.6; max-width: 280px; }
    .site-footer .footer-col h4 { font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-4); color: var(--fg); }
    .site-footer .footer-col a { display: block; font-size: var(--text-sm); color: var(--muted); padding: var(--space-1) 0; transition: color var(--transition-fast); }
    .site-footer .footer-col a:hover { color: var(--fg); opacity: 1; }
    .site-footer .footer-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-10); padding-top: var(--space-5); border-top: 1px solid var(--border); font-size: var(--text-xs); color: var(--muted); }

    /* ========== Landing page (index view) ========== */
    .launcher-hero { position: relative; min-height: 520px; display: flex; align-items: center; padding: var(--space-16) 0; overflow: hidden; }
    .launcher-hero .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 15% 30%, oklch(68% 0.20 45 / 0.10) 0%, transparent 55%), radial-gradient(ellipse 50% 40% at 85% 70%, oklch(28% 0.08 280 / 0.5) 0%, transparent 50%), linear-gradient(180deg, var(--bg) 0%, oklch(18% 0.035 280) 100%); }
    .launcher-hero .hero-visual { position: absolute; right: -5%; top: 50%; transform: translateY(-50%); width: 55%; max-width: 700px; opacity: 0.35; mask-image: linear-gradient(90deg, transparent 0%, black 40%); -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 40%); pointer-events: none; }
    .launcher-hero .hero-visual img { width: 100%; border-radius: var(--radius-lg); }
    .launcher-hero .container { position: relative; }
    .launcher-hero .hero-title { font-size: clamp(40px, 5vw, 72px); }

    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: var(--space-5); margin-top: var(--space-10); }
    .feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-6); transition: all var(--transition-base); cursor: pointer; text-decoration: none; color: inherit; display: block; }
    .feature-card:hover { background: var(--surface-hover); border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-md), var(--shadow-glow); }
    .feature-card .icon { width: 44px; height: 44px; border-radius: var(--radius-sm); background: oklch(68% 0.20 45 / 0.12); border: 1px solid oklch(68% 0.20 45 / 0.2); display: grid; place-items: center; margin-bottom: var(--space-4); }
    .feature-card .icon svg { width: 22px; height: 22px; color: var(--accent); }
    .feature-card h3 { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2); letter-spacing: -0.01em; }
    .feature-card p { font-size: var(--text-sm); color: var(--muted); line-height: 1.6; }
    .feature-card .cta { display: inline-flex; align-items: center; gap: var(--space-2); margin-top: var(--space-4); font-size: var(--text-sm); font-weight: 600; color: var(--accent); }
    .feature-card .cta svg { width: 14px; height: 14px; transition: transform var(--transition-fast); }
    .feature-card:hover .cta svg { transform: translateX(3px); }

    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-6); padding: var(--space-8) 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-top: var(--space-16); }
    .stats-bar .stat { text-align: center; }
    .stats-bar .stat-value { font-size: var(--text-3xl); color: var(--accent); margin-bottom: var(--space-2); }

    .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-5); margin-top: var(--space-6); }
    .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; transition: all var(--transition-base); text-decoration: none; color: inherit; display: block; }
    .preview-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
    .preview-card .thumb { width: 100%; height: 160px; background: var(--surface-elev); border-bottom: 1px solid var(--border); display: grid; place-items: center; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .preview-card .info { padding: var(--space-5); }
    .preview-card .info h4 { font-family: var(--font-display); font-size: var(--text-base); font-weight: 700; margin-bottom: var(--space-2); }
    .preview-card .info p { font-size: var(--text-sm); color: var(--muted); line-height: 1.55; }

    /* ========== Forum / Home view ========== */
    .home-layout { display: grid; grid-template-columns: 1fr 320px; gap: var(--space-8); padding-top: var(--space-8); padding-bottom: var(--space-12); }
    .sub-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-8); margin-bottom: var(--space-6); position: relative; overflow: hidden; }
    .sub-hero::before { content: ''; position: absolute; top: -50%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, oklch(68% 0.20 45 / 0.08) 0%, transparent 70%); pointer-events: none; }
    .sub-hero h1 { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 800; letter-spacing: -0.02em; margin-bottom: var(--space-3); position: relative; }
    .sub-hero p { color: var(--muted); font-size: var(--text-base); max-width: 520px; position: relative; }
    .sub-hero .actions { display: flex; gap: var(--space-3); margin-top: var(--space-5); position: relative; flex-wrap: wrap; }

    .filter-bar { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-5); flex-wrap: wrap; }
    .filter-bar .filter-pill { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-radius: var(--radius-full); border: 1px solid var(--border); background: var(--surface); font-size: var(--text-sm); font-weight: 500; color: var(--muted); cursor: pointer; transition: all var(--transition-fast); white-space: nowrap; }
    .filter-bar .filter-pill:hover, .filter-bar .filter-pill.active { background: var(--accent); border-color: var(--accent); color: oklch(15% 0.03 280); }
    .filter-bar .filter-pill.active { font-weight: 600; }
    .filter-bar .spacer { flex: 1; }
    .filter-bar .sort-select { padding: var(--space-2) var(--space-3); font-size: var(--text-sm); min-width: 120px; }

    .sidebar { display: flex; flex-direction: column; gap: var(--space-6); }
    .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); }
    .sidebar-card h3 { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-4); color: var(--fg); }
    .hot-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--border); }
    .hot-item:last-child { border-bottom: none; }
    .hot-rank { width: 24px; text-align: center; font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 700; color: var(--muted); }
    .hot-rank.top { color: var(--accent); }
    .hot-info { flex: 1; min-width: 0; }
    .hot-info .name { font-size: var(--text-sm); font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hot-info .meta { font-size: var(--text-xs); color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .tag-cloud .tag { padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); background: var(--surface-elev); border: 1px solid var(--border); font-size: var(--text-xs); color: var(--muted); cursor: pointer; transition: all var(--transition-fast); }
    .tag-cloud .tag:hover { border-color: var(--accent); color: var(--accent); }
    .creator-mini { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--border); }
    .creator-mini:last-child { border-bottom: none; }
    .creator-mini .info { flex: 1; }
    .creator-mini .info .name { font-size: var(--text-sm); font-weight: 600; }
    .creator-mini .info .role { font-size: var(--text-xs); color: var(--muted); }
    .creator-mini .btn-sm { padding: var(--space-1) var(--space-3); font-size: var(--text-xs); }

    /* ========== Marketplace view ========== */
    .market-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: var(--space-8) 0; position: relative; overflow: hidden; }
    .market-header::before { content: ''; position: absolute; top: -50%; right: -5%; width: 400px; height: 400px; background: radial-gradient(circle, oklch(68% 0.20 45 / 0.08) 0%, transparent 60%); pointer-events: none; }
    .market-header h1 { font-family: var(--font-display); font-size: var(--text-3xl); font-weight: 800; letter-spacing: -0.02em; margin-bottom: var(--space-3); position: relative; }

      .listing-card { flex-direction: column; }
      .listing-card .cover { width: 100%; height: 140px; }

    /* ========== Theme overrides ========== */
    [data-theme="cyberpunk"] {
      --bg: oklch(12% 0.02 260); --surface: oklch(16% 0.03 260); --fg: oklch(96% 0.005 250);
      --muted: oklch(58% 0.04 260); --border: oklch(24% 0.04 260); --accent: oklch(75% 0.22 195);
      --accent-2: oklch(65% 0.20 195); --accent-glow: oklch(75% 0.22 195 / 0.28);
      --surface-elev: oklch(22% 0.05 260); --surface-hover: oklch(28% 0.06 260);
      --success: oklch(70% 0.16 155); --warn: oklch(80% 0.15 90); --danger: oklch(62% 0.20 25); --info: oklch(70% 0.14 250);
    }
    [data-theme="cyberpunk"] .site-nav { background: oklch(12% 0.02 260 / 0.85); border-bottom-color: oklch(75% 0.22 195 / 0.25); }

        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem(STORE.theme, theme);
        state.theme = theme;
        if (window._bgCanvas) window._bgCanvas.setTheme(theme);
        updateCtrlLabels();

      function applyLang(lang) {
        state.lang = lang;

          const key = el.getAttribute('data-i18n');
          const dict = i18n[lang];
          if (dict && dict[key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = dict[key];
            else el.textContent = dict[key];
          }
        });
        updateCtrlLabels();

      /* =============== Canvas Background =============== */
      class BgCanvas {
        constructor() {
          this.canvas = document.createElement('canvas');
          this.canvas.id = 'flashdev-bg-canvas';
          this.ctx = this.canvas.getContext('2d');
          this.particles = []; this.ripples = [];
          this.mouse = { x: -1000, y: -1000, active: false };
          this.theme = state.theme;
          this.resize(); this.initParticles(); this.bind(); this.loop();
        }
        setTheme(t) { this.theme = t; this.initParticles(); }
        resize() {
          this.w = window.innerWidth; this.h = window.innerHeight;
          const dpr = Math.min(window.devicePixelRatio, 2);
          this.canvas.width = this.w * dpr; this.canvas.height = this.h * dpr;
          this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        bind() {
          window.addEventListener('resize', () => { this.resize(); this.initParticles(); });
          window.addEventListener('mousemove', e => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; this.mouse.active = true; });
          window.addEventListener('mouseleave', () => { this.mouse.active = false; });
          window.addEventListener('click', e => { this.addRipple(e.clientX, e.clientY); });
        }
        initParticles() {
          this.particles = [];
          const count = this.theme === 'cyberpunk' ? 100 : 70;
          for (let i = 0; i < count; i++) this.particles.push(this.createParticle());
        }
        createParticle() {
          if (this.theme === 'cyberpunk') {
            return { x: Math.random() * this.w, y: Math.random() * this.h, vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2, size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.5 + 0.2, color: Math.random() > 0.5 ? '0,240,255' : '255,0,128', trail: [], type: 'neon' };
          }
          return { x: Math.random() * this.w, y: Math.random() * this.h, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3 - 0.15, size: Math.random() * 3 + 1, alpha: Math.random() * 0.35 + 0.1, color: Math.random() > 0.6 ? '168,85,247' : Math.random() > 0.5 ? '99,102,241' : '236,72,153', pulse: Math.random() * Math.PI * 2, pulseSpeed: Math.random() * 0.02 + 0.01, type: 'dream' };
        }
        addRipple(x, y) { this.ripples.push({ x, y, r: 0, alpha: 0.5, maxR: this.theme === 'cyberpunk' ? 100 : 160 }); }
        update() {
          this.particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (this.theme === 'cyberpunk') {
              if (this.mouse.active) {
                const dx = p.x - this.mouse.x, dy = p.y - this.mouse.y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 140 && dist > 0) { const force = (140 - dist) / 140 * 0.6; p.vx += (dx / dist) * force; p.vy += (dy / dist) * force; }
              }
              p.vx *= 0.98; p.vy *= 0.98;
              p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
              if (p.trail.length > 6) p.trail.shift();
            } else {
              p.pulse += p.pulseSpeed;
              if (this.mouse.active) {
                const dx = this.mouse.x - p.x, dy = this.mouse.y - p.y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180 && dist > 0) { p.vx += (dx / dist) * 0.015; p.vy += (dy / dist) * 0.015; }
              }
            }
            if (p.x < -10) p.x = this.w + 10; if (p.x > this.w + 10) p.x = -10;
            if (p.y < -10) p.y = this.h + 10; if (p.y > this.h + 10) p.y = -10;
          });
          this.ripples.forEach(r => { r.r += 2; r.alpha -= 0.012; });
          this.ripples = this.ripples.filter(r => r.alpha > 0);
        }
        draw() {
          this.ctx.clearRect(0, 0, this.w, this.h);
          if (this.theme === 'cyberpunk') this.drawCyberpunk(); else this.drawDreamy();
          this.ripples.forEach(r => {
            this.ctx.beginPath(); this.ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
            this.ctx.strokeStyle = this.theme === 'cyberpunk' ? `rgba(0,240,255,${r.alpha})` : `rgba(168,85,247,${r.alpha})`;
            this.ctx.lineWidth = 1.5; this.ctx.stroke();
          });
        }
        drawCyberpunk() {
          const gridSize = 50;
          this.ctx.strokeStyle = 'rgba(0,240,255,0.035)'; this.ctx.lineWidth = 1;
          for (let x = 0; x < this.w; x += gridSize) { this.ctx.beginPath(); this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.h); this.ctx.stroke(); }
          for (let y = 0; y < this.h; y += gridSize) { this.ctx.beginPath(); this.ctx.moveTo(0, y); this.ctx.lineTo(this.w, y); this.ctx.stroke(); }
          const scanY = (Date.now() / 20) % this.h;
          const grad = this.ctx.createLinearGradient(0, scanY - 20, 0, scanY + 20);
          grad.addColorStop(0, 'rgba(0,240,255,0)'); grad.addColorStop(0.5, 'rgba(0,240,255,0.05)'); grad.addColorStop(1, 'rgba(0,240,255,0)');
          this.ctx.fillStyle = grad; this.ctx.fillRect(0, scanY - 20, this.w, 40);
          this.particles.forEach(p => {
            p.trail.forEach((t, i) => { const a = (i / p.trail.length) * t.alpha * 0.4; this.ctx.beginPath(); this.ctx.arc(t.x, t.y, p.size * 0.5, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${a})`; this.ctx.fill(); });
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${p.alpha})`; this.ctx.fill();
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${p.alpha * 0.12})`; this.ctx.fill();
          });
          this.ctx.strokeStyle = 'rgba(0,240,255,0.05)'; this.ctx.lineWidth = 0.5;
          for (let i = 0; i < this.particles.length; i++) for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x, dy = this.particles[i].y - this.particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) { this.ctx.beginPath(); this.ctx.moveTo(this.particles[i].x, this.particles[i].y); this.ctx.lineTo(this.particles[j].x, this.particles[j].y); this.ctx.stroke(); }
          }
        }
        drawDreamy() {
          const time = Date.now() / 3000;
          const gx = this.w * 0.3 + Math.sin(time) * 100, gy = this.h * 0.4 + Math.cos(time * 0.7) * 80;
          const g = this.ctx.createRadialGradient(gx, gy, 0, gx, gy, 500);
          g.addColorStop(0, 'rgba(99,102,241,0.07)'); g.addColorStop(0.5, 'rgba(168,85,247,0.03)'); g.addColorStop(1, 'rgba(0,0,0,0)');
          this.ctx.fillStyle = g; this.ctx.fillRect(0, 0, this.w, this.h);
          const g2 = this.ctx.createRadialGradient(this.w - gx, this.h - gy, 0, this.w - gx, this.h - gy, 400);
          g2.addColorStop(0, 'rgba(236,72,153,0.05)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
          this.ctx.fillStyle = g2; this.ctx.fillRect(0, 0, this.w, this.h);
          this.particles.forEach(p => {
            const pulse = Math.sin(p.pulse) * 0.3 + 0.7, size = p.size * pulse, alpha = p.alpha * pulse;
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, size * 5, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${alpha * 0.06})`; this.ctx.fill();
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, size * 2, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${alpha * 0.15})`; this.ctx.fill();
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, size, 0, Math.PI * 2); this.ctx.fillStyle = `rgba(${p.color},${alpha})`; this.ctx.fill();
          });
          this.ctx.strokeStyle = 'rgba(168,85,247,0.03)'; this.ctx.lineWidth = 0.5;
          for (let i = 0; i < this.particles.length; i++) for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x, dy = this.particles[i].y - this.particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 160) { this.ctx.beginPath(); this.ctx.moveTo(this.particles[i].x, this.particles[i].y); this.ctx.lineTo(this.particles[j].x, this.particles[j].y); this.ctx.stroke(); }
          }
        }
        loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
      }

      class CursorGlow {
        constructor() {
          this.el = document.createElement('div'); this.el.id = 'flashdev-cursor-glow'; document.body.appendChild(this.el);
          this.x = -200; this.y = -200; this.targetX = -200; this.targetY = -200; this.bind(); this.loop();
        }
        bind() { window.addEventListener('mousemove', e => { this.targetX = e.clientX; this.targetY = e.clientY; }); }

      function getRoute() {
        const hash = location.hash.replace(/^#/, '') || '/';
        return hash.startsWith('/') ? hash : '/' + hash;
      }

      function setActiveNav(route) {
        document.querySelectorAll('.site-nav .nav-links a').forEach(a => {
          const href = a.getAttribute('href');
          a.classList.toggle('active', route === href.replace('#', '') || (route === '/' && href === '#/'));
        });
      }

      function render(route) {
        window.scrollTo(0, 0);
        let html = '';
        switch (route) {
          case '/': case '/index': html = viewIndex(); break;
          case '/home': html = viewForum(); break;
          case '/market': html = viewMarket(); break;
          case '/profile': html = viewProfile(); break;
          case '/project': html = viewProject(); break;
          default: html = viewIndex();
        }
        app.innerHTML = `<div class="view">${html}</div>`;
        setActiveNav(route);
        applyLang(state.lang);
        bindViewInteractions();
      }

      function navigate(route) {
        location.hash = route;
      }

      function bindGlobalNav() {
        document.body.addEventListener('click', e => {
          const a = e.target.closest('a[data-nav]');
          if (a) {
            const href = a.getAttribute('href');
            if (href && href.startsWith('#/')) {
              e.preventDefault();
              navigate(href.replace('#', ''));
            }
          }
        });
        window.addEventListener('hashchange', () => render(getRoute()));
      }

      function bindViewInteractions() {
        // Tabs inside rendered views
        app.querySelectorAll('.tabs[data-tabs]').forEach(tabs => {
          tabs.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
              const group = tab.closest('.tabs').dataset.tabs;
              document.querySelectorAll(`.tabs[data-tabs="${group}"] .tab`).forEach(t => t.classList.remove('active'));
              document.querySelectorAll(`.tab-panel[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
              tab.classList.add('active');
              const panel = tab.dataset.panel;
              const p = document.getElementById(panel);
              if (p) p.classList.add('active');
            });
          });
        });
        // Filter pills (visual toggle only)
        app.querySelectorAll('.filter-bar').forEach(bar => {
          bar.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
              bar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
              pill.classList.add('active');
            });
          });
        });
      }

      window.switchTab = function(btn, panelId) {
        const tabs = btn.closest('.tabs');
        if (tabs) {
          tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
        }
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const p = document.getElementById(panelId);
        if (p) p.classList.add('active');
      };

      /* =============== Mobile nav toggle =============== */
      function bindMobileNav() {
        const toggle = document.getElementById('nav-toggle');
        const links = document.querySelector('.site-nav .nav-links');
        if (!toggle || !links) return;
        toggle.addEventListener('click', () => {
          const showing = links.style.display === 'flex';
          links.style.display = showing ? 'none' : 'flex';
          links.style.position = 'absolute';
          links.style.top = '60px';
          links.style.left = '0';
          links.style.right = '0';
          links.style.flexDirection = 'column';
          links.style.background = 'var(--surface)';
          links.style.padding = 'var(--space-4)';
          links.style.borderBottom = '1px solid var(--border)';
          links.style.zIndex = '99';
          if (showing) links.style.display = 'none';
        });
      }

      /* =============== Init =============== */
      function init() {
        const bg = new BgCanvas();
        window._bgCanvas = bg;
        document.body.insertBefore(bg.canvas, document.body.firstChild);
        new CursorGlow();
        injectControlPanel();
        bindGlobalNav();
        bindMobileNav();
        applyTheme(state.theme);
        applyLang(state.lang);
        render(getRoute());
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
